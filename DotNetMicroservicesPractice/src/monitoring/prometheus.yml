global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5202"]

  - job_name: "order-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5067"]

  - job_name: "inventory-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5026"]